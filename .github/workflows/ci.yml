name: CI

# Runs on every PR plus pushes to long-lived branches so a broken main
# is loud. Concurrency cancels superseded runs so back-to-back force
# pushes don't queue up wasted minutes.
on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint • type-check • test • build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Placeholders that satisfy env validation at boot. Real values
    # aren't needed — this job doesn't connect to a DB, send email, or
    # call Stripe. It lints, type-checks, runs unit tests, and builds.
    env:
      DATABASE_URL: 'postgres://ci:ci@localhost:5432/ci'
      AUTH_SECRET: 'ci-secret-not-used-at-runtime-padding-1234'
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
      # Phase 1 packages tolerate missing values at compile time —
      # they only throw at first use.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install
        run: yarn install --immutable

      - name: Generate Prisma client
        run: yarn db:generate

      - name: Lint
        run: yarn lint

      - name: Type-check
        run: yarn type-check

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build
